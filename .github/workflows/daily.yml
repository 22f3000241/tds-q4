name: Daily Auto Commit

on:
  schedule:
    - cron: "5 18 * * *"   # Runs daily at 18:05 UTC (specific time, no wildcards)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 22f3000241@ds.study.iitm.ac.in Auto Commit Step
        run: |
          echo "Last run: $(date)" >> daily_log.txt

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Automated daily commit" || echo "No changes to commit"
          git push

